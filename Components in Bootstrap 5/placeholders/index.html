<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap 5</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <style>
        .h-10 {
            height: 10rem;
        }
    </style>
</head>

<body>
    <h1>Hello Sifat!</h1>

    <div class="container mt-3">
        <div class="row justify-content-center">
            <div class="col-md-3">
                <div class="card">
                    <img class="card-img-top"
                        src="https://cdn.pixabay.com/photo/2022/11/01/09/03/mountains-7561698_1280.jpg" alt="">
                    <div class="card-body">
                        <h5 class="card-title placeholder-glow">
                            <span class="placeholder col-6"></span>
                        </h5>
                        <p lass="card-text placeholder-glow">
                            <span class="placeholder col-7 bg-success"></span>
                            <span class="placeholder col-4"></span>
                            <span class="placeholder col-4 bg-danger"></span>
                            <span class="placeholder col-2 bg-warning"></span>
                            <span class="placeholder col-3"></span>
                            <span class="placeholder col-8"></span>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</html>
