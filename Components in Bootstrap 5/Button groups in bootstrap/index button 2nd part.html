<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap 5</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        .h-10 {
            height: 10rem;
        }
    </style>
</head>

<body>
    <h1>Hello Sifat!</h1>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="d-grid gap-2">
                    <button class="btn btn-primary">Button</button>
                    <button class="btn btn-primary">Button</button>
                </div>
            </div>
        </div>
        <div class="row justify-content-center mt-3">
            <div class="col-md-8">
                <div class="d-grid gap-2 d-md-block">
                    <button class="btn btn-primary">Button</button>
                    <button class="btn btn-primary">Button</button>
                </div>
            </div>
        </div>
        <div class="row justify-content-center mt-3">
            <div class="col-md-8">
                <div class="d-grid gap-2 d-md-block">
                    <button class="btn btn-primary " type="button" data-bs-toggle="button">Toggle Button</button>
                    <button class="btn btn-primary active" type="button" data-bs-toggle="button"
                        aria-pressed="true">Toggle Button</button>
                    <button class="btn btn-primary active" type="button" data-bs-toggle="button" disabled>Toggle
                        Button</button>
                </div>
            </div>
        </div>
        <div class="row justify-content-center mt-3">
            <div class="col-md-8">
                <a href="#" class="btn btn-success" data-bs-toggle="button" role="button">Toggle Link</a>
                <a href="#" class="btn btn-success active" data-bs-toggle="button" role="button"
                    aria-pressed="true">Toggle
                    <a href="#" class="btn btn-success disabled" data-bs-toggle="button" role="button"
                        aria-pressed="true">Toggle Link</a>
            </div>
        </div>
        <div class="row justify-content-center mt-3">
            <div class="col-md-8">
                <button class="btn " style="
                                            --bs-btn-color: white;
                                            --bs-btn-bg: crimson;
                                            --bs-btn-border-color:orangered;
                                            --bs-btn-hover-color:white;
                                            --bs-btn-hover-bg:black;
                                            --bs-btn-hover-color: crimson;
                    ">Custom Button</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
