<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap 5</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        .h-10 {
            height: 10rem;
        }
    </style>
</head>

<body>
    <h1>Hello Sifat!</h1>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h1>Example Heading <span class="badge bg-primary">Badge</span></h1>
                <h2>Example Heading <span class="badge bg-secondary">Badge</span></h2>
                <h3>Example Heading <span class="badge bg-warning">Badge</span></h3>
                <h4>Example Heading <span class="badge bg-success">Badge</span></h4>
                <h5>Example Heading <span class="badge bg-info">Badge</span></h5>
                <h6>Example Heading <span class="badge bg-danger">Badge</span></h6>
            </div>
        </div>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <button class="btn btn-warning" type="button">Notification <span
                        class="badge bg-primary">4</span></button>
            </div>
        </div>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <button class="btn btn-warning position-relative mt-4" type="button">Notification <span
                        class="badge bg-primary rounded-pill position-absolute top-0 start-100 translate-middle">466+
                        <span class="visually-hidden">Unread Message</span></span></button>
            </div>
        </div>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <button class="btn btn-warning position-relative mt-4" type="button">Notification <span
                        class="badge bg-primary rounded-pill position-absolute top-0 start-100 translate-middle p-2 border border-warning">
                        <span class="visually-hidden">Unread Message</span></span></button>
            </div>
        </div>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <span class="badge rounded-pill text-bg-primary">Primary</span>
                <span class="badge rounded-pill text-bg-secondary">Secondary</span>
                <span class="badge rounded-pill text-bg-success">Success</span>
                <span class="badge rounded-pill text-bg-warning">Warning</span>
                <span class="badge rounded-pill text-bg-danger">Danger</span>
                <span class="badge rounded-pill text-bg-info">Info</span>
                <span class="badge rounded-pill text-bg-dark">Dark</span>
                <span class="badge rounded-pill text-bg-light">Light</span>
            </div>
        </div>
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
