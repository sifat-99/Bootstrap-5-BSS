<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

<body>
    <h1>Hello Sifat!</h1>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <button type="button" class="btn btn-primary"> Primary</button>
                <button type="button" class="btn btn-secondary"> Secondary</button>
                <button type="button" class="btn btn-warning"> Warning</button>
                <button type="button" class="btn btn-info"> Info</button>
                <button type="button" class="btn btn-success"> Success</button>
                <button type="button" class="btn btn-danger"> Danger</button>
                <button type="button" class="btn btn-dark"> Dark</button>
                <button type="button" class="btn btn-link"> Link</button>
            </div>
        </div>
        <div class="row justify-content-center mt-3">
            <div class="col-md-8">
                <button type="button" class="btn btn-outline-primary"> Primary</button>
                <button type="button" class="btn btn-outline-secondary"> Secondary</button>
                <button type="button" class="btn btn-outline-warning"> Warning</button>
                <button type="button" class="btn btn-outline-info"> Info</button>
                <button type="button" class="btn btn-outline-success"> Success</button>
                <button type="button" class="btn btn-outline-danger"> Danger</button>
                <button type="button" class="btn btn-outline-dark"> Dark</button>
                <button type="button" class="btn btn-outline-link"> Link</button>
            </div>
        </div>
        <div class="row justify-content-center mt-3">
            <div class="col-md-8">
                <button class="btn btn-primary" type="button" class="btn btn-primary"> Submit</button>
                <input class="btn btn-primary" type="submit" name="" id="" value="Submit">
                <input class="btn btn-primary" type="reset" name="" id="" value="Reset">
                <input class="btn btn-primary" type="button" name="" id="" value="Button">
                <a href="#" class="btn btn-primary">Button</a>
            </div>
        </div>
        <div class="row justify-content-center mt-3">
            <div class="col-md-8">
                <button type="button" class="btn btn-outline-primary"> Primary</button>
                <button type="button" class="btn btn-outline-secondary btn-lg"> Secondary</button>
                <button type="button" class="btn btn-outline-warning btn-sm"> Warning</button>
            </div>
        </div>
        <div class="row justify-content-center mt-3">
            <div class="col-md-8">
                <button type="button" class="btn btn-primary" style="
                --bs-btn-padding-y: 24px;
                --bs-btn-padding-x: 48px;
                --bs-btn-font-size: 16px;
                "> Custon Button</button>
            </div>
        </div>
        <div class="row justify-content-center mt-3">
            <div class="col-md-8">
                <button type="button" class="btn btn-primary" style="
                --bs-btn-padding-y: 24px;
                --bs-btn-padding-x: 48px;
                --bs-btn-font-size: 16px;
                " disabled> Custon Button</button>
            </div>
        </div>
        <div class="row justify-content-center mt-3">
            <div class="col-md-8">
                <a href="#" type="button" class="btn btn-primary disabled" role="button" aria-disabled="true">
                    Disabled link</a>
            </div>
        </div>

    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
