<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap 5</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <style>
        .h-10 {
            height: 10rem;
        }
    </style>
</head>

<body>
    <h1>Hello Sifat!</h1>
    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div id="slides-with-indicators" class="carousel slide" data-bs-ride="carousel">
                    <div class="carousel-indicators">
                        <button class="active" type="button" data-bs-target="#slides-with-indicators"
                            data-bs-slide-to="0" aria-level="Slide 1"></button>
                        <button class="active" type="button" data-bs-target="#slides-with-indicators"
                            data-bs-slide-to="1" aria-level="Slide 2"></button>
                        <button class="active" type="button" data-bs-target="#slides-with-indicators"
                            data-bs-slide-to="2" aria-level="Slide 3"></button>
                    </div>
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img class="d-block w-100"
                                src="https://cdn.pixabay.com/photo/2021/09/14/02/29/field-6622793_1280.jpg" alt="">
                        </div>
                        <div class="carousel-item ">
                            <img class="d-block w-100"
                                src="https://cdn.pixabay.com/photo/2021/09/14/02/29/field-6622793_1280.jpg" alt="">
                        </div>
                        <div class="carousel-item ">
                            <img class="d-block w-100"
                                src="https://cdn.pixabay.com/photo/2021/09/14/02/29/field-6622793_1280.jpg" alt="">
                        </div>
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#slides-with-indicators"
                        data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="visually-hidden" aria-hidden="true">Previous</span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#slides-with-indicators"
                        data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="visually-hidden" aria-hidden="true">Next</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
