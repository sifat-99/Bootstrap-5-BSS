<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap 5</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <style>
        .h-10 {
            height: 10rem;
        }
    </style>
</head>

<body>
    <h1>Hello Sifat!</h1>
    <div class="container text-center">
        <div class="row">
            <div class="col-md-8">
                <form>
                    <div class="mb-3 form-floating">
                        <input type="text" class="form-control is-invalid" id="floatingInput" placeholder="Username"
                            value="sifat">
                        <label for="floatingInput">Username</label>
                    </div>
                    <div class="mb-3 form-floating">
                        <input type="text" class="form-control" id="floatingInput1" placeholder="Password">
                        <label for="floatingInput1">Password</label>
                    </div>
                    <div class="mb-3 form-floating">
                        <select name="" id="Country" class="form-select">
                            <option value="One">One</option>
                            <option value="Two ">Two</option>
                            <option value="Three">Three</option>
                        </select>
                        <label for="Country" id="Country">Select</label>
                    </div>
                </form>
            </div>
        </div>
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
