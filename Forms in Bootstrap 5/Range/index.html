<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap 5</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <style>
        .h-10 {
            height: 10rem;
        }
    </style>
</head>

<body>
    <h1>Hello Sifat!</h1>
    <div class="container text-center">
        <div class="row">
            <div class="col-md-6">
                <form>
                    <div>
                        <label for="custom-range" class="form-label">Range</label>
                        <input type="range" id="custom-range" class="form-range">
                    </div>
                    <div>
                        <label for="custom-range" class="form-label">Range</label>
                        <input type="range" id="custom-range" disabled class="form-range">
                    </div>
                    <div>
                        <label for="custom-range" class="form-label">Range</label>
                        <input type="range" id="custom-range" min="0" max="5" class="form-range" step="0.5">
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
