<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap 5</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <style>
        .h-10 {
            height: 10rem;
        }
    </style>
</head>

<body>
    <h1>Hello Sifat!</h1>
    <div class="container mt-3">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <form>
                    <div class="row mb-2 g-2">
                        <label for="email_id" class="col-md-2 col-form-label col-form-label-sm">Email ID</label>
                        <div class="col-md-10">
                            <input type="email" name="" id="email-id" class="form-control from-control-sm"
                                placeholder="Your Email">
                        </div>
                    </div>
                    <div class="row mb-2 g-2">
                        <label for="user_name" class="col-md-2 col-form-label col-form-label-sm">Username</label>
                        <div class="col-md-10">
                            <input type="text" name="" id="user_name" class="form-control from-control-sm"
                                placeholder="Your Name">
                        </div>
                    </div>
                    <div class="row mb-2 g-2">
                        <label for="pass" class="col-md-2 col-form-label col-form-label-sm">Password</label>
                        <div class="col-md-5">
                            <input type="text" name="" id="pass1" class="form-control from-control-sm"
                                placeholder="Password">
                        </div>
                        <div class="col-md-5">
                            <input type="text" name="" id="pass" class="form-control from-control-sm"
                                placeholder="Re Enter password">
                        </div>
                    </div>
                    <div class="row mb-2 ">
                        <div class="col-md-10 offset-md-2">
                            <input type="submit" name="" id="" class="btn btn-success" value="Sign up to continue">
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
