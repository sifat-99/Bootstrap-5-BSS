<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap 5</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <style>
        .h-10 {
            height: 10rem;
        }
    </style>
</head>

<body>
    <h1>Hello Sifat!</h1>
    <div class="container mt-3">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <form name="myForm" onsubmit="runMyForm(); return false">
                    <div class="mb-2">
                        <label for="username">Username</label>
                        <div class="input-group ">
                            <span class="input-group-text">@</span>
                            <input type="text" class="form-control" placeholder="Password" id="username">
                        </div>
                    </div>
                    <div class="mb-2">
                        <label for="pass">Password</label>
                        <input type="password" class="form-control" placeholder="Password" id="pass">
                    </div>
                    <div class="mb-2">
                        <input type="submit" class="btn btn-success btn-sm" value="Sign Up to continue">
                    </div>
                </form>
            </div>
        </div>
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        var u_name = document.myForm.username;
        var pass = document.myForm.pass;
        function runMyForm() {
            if (u_name.value == '') {
                u_name.classList.add('is-invalid')
            }
            else if (u_name.value) {
                u_name.classList.remove('is-invalid')
                u_name.classList.add('is-valid')
            }
            if (pass.value == '' || pass.value.length < 6) {
                pass.classList.add('is-invalid')
            }
            else if (u_name.value.length > 6) {
                pass.classList.remove('is-invalid')
                pass.classList.add('is-valid')
            }

        }

    </script>
</body>

</html>
