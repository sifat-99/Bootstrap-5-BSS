<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap 5</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <style>
        .h-10 {
            height: 10rem;
        }
    </style>
</head>

<body>
    <h1>Hello Sifat!</h1>
    <div class="container  mt-3">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <form>
                    <div class="mb-3">
                        <label for="u_name" class="form-label"> Username</label>
                        <input type="text" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label for="u_comment" class="form-label">Comment</label>
                        <textarea name="" id="u_comment" rows="5" class="form-control"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="u_text" class="form-label">Some Texts</label>
                        <input type="text" name="" id="u_text" class="form-control form-control-lg">
                    </div>
                    <div class="mb-3">
                        <label for="u_email" class="form-label">Email</label>
                        <input type="email" name="" id="u_email" class="form-control form-control-sm"
                            value="marsk@gmail.com" readonly>
                    </div>
                    <div class="mb-3">
                        <label for="u_file" class="form-label">File</label>
                        <input type="file" name="" id="u_email" class="form-control form-control-sm">
                    </div>
                    <div class="mb-3">
                        <label for="u_color" class="form-label">Color</label>
                        <input type="color" name="" id="u_color" class="form-control form-control-color form-control-sm"
                            disabled>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
