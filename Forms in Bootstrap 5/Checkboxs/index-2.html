<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap 5</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <style>
        .h-10 {
            height: 10rem;
        }
    </style>
</head>

<body>
    <h1>Hello Sifat!</h1>
    <div class="container  mt-3">
        <div class="row justify-content-center">
            <div class="col-md-12">
                <form>
                    <div class="form-check  form-check-reverse">
                        <input type="checkbox" class="form-check-input" value="Checked" id="defaultCheckbox">
                        <label for="defaultCheckbox" class="form-check-label">Default checkbox</label>
                    </div>
                    <div class="form-check  form-check-reverse">
                        <input type="checkbox" class="form-check-input" value="Checked" id="defaultCheckbox1" Checked>
                        <label for="defaultCheckbox1" class="form-check-label">Default checkbox</label>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        var checkbox = document.getElementById("defaultCheckbox1").indeterminate = true;
    </script>
</body>

</html>
